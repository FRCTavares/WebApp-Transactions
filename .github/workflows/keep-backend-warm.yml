name: Keep backend warm

on:
  schedule:
    - cron: "7/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping backend health endpoint
        run: |
          set -euo pipefail

          BACKEND_URL="https://f-transactions-api.onrender.com"

          echo "Pinging backend health endpoint..."
          curl --fail --silent --show-error --location --max-time 120 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$BACKEND_URL/api/health"
