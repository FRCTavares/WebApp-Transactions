name: Keep backend warm and monitor availability

# This workflow's actual job, as of 2026-07-20, is monitoring/alerting: a
# failed scheduled run triggers GitHub's default email notification to repo
# watchers. See docs/incident-response.md and
# docs/oauth-and-hosting-checklist.md for the reasoning.
#
# It does NOT reliably reduce Render cold starts by itself -- GitHub Actions
# silently throttles frequent cron schedules like the one below to roughly
# hourly under normal load, regardless of what's written here. That's a
# GitHub-side limitation, not a bug in this file. The actual 10-minute
# keep-warm pinging is handled externally by a free cron-job.org job hitting
# GET /api/health, which isn't subject to this throttling.

on:
  schedule:
    - cron: "7/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping backend liveness
        run: |
          set -euo pipefail

          BACKEND_URL="https://f-transactions-api.onrender.com"

          echo "Pinging backend liveness endpoint..."
          curl --fail --silent --show-error --location --max-time 120 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$BACKEND_URL/api/health"

      - name: Check backend readiness (database connectivity)
        run: |
          set -euo pipefail

          BACKEND_URL="https://f-transactions-api.onrender.com"

          echo "Checking backend readiness endpoint..."
          curl --fail --silent --show-error --location --max-time 30 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$BACKEND_URL/api/ready"

      - name: Check frontend availability
        run: |
          set -euo pipefail

          FRONTEND_URL="https://web-app-transactions.vercel.app"

          echo "Checking frontend availability..."
          curl --fail --silent --show-error --location --max-time 30 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$FRONTEND_URL/" > /dev/null
