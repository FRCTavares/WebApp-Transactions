name: Keep backend warm and monitor availability

# This workflow serves two purposes:
# 1. Reduce (not eliminate) Render free-tier cold starts.
# 2. Act as the primary automated monitoring/alerting mechanism: a failed
#    scheduled run triggers GitHub's default email notification to repo
#    watchers. See docs/incident-response.md and
#    docs/oauth-and-hosting-checklist.md for the reasoning.

on:
  schedule:
    - cron: "7/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping backend liveness
        run: |
          set -euo pipefail

          BACKEND_URL="https://f-transactions-api.onrender.com"

          echo "Pinging backend liveness endpoint..."
          curl --fail --silent --show-error --location --max-time 120 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$BACKEND_URL/api/health"

      - name: Check backend readiness (database connectivity)
        run: |
          set -euo pipefail

          BACKEND_URL="https://f-transactions-api.onrender.com"

          echo "Checking backend readiness endpoint..."
          curl --fail --silent --show-error --location --max-time 30 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$BACKEND_URL/api/ready"

      - name: Check frontend availability
        run: |
          set -euo pipefail

          FRONTEND_URL="https://web-app-transactions.vercel.app"

          echo "Checking frontend availability..."
          curl --fail --silent --show-error --location --max-time 30 \
            --write-out "\nHTTP status: %{http_code}\nTotal time: %{time_total}s\n" \
            "$FRONTEND_URL/" > /dev/null
