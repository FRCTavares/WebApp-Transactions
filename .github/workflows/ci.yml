name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run backend test suite
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/backend-tests.db
        run: |
          set -euo pipefail
          python -m pytest -q

  database-validation:
    name: Database and recovery
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Upgrade a clean database
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/migration-check.db
        run: |
          set -euo pipefail
          alembic upgrade head
          alembic current
          test "$(alembic heads | grep -c '(head)')" = "1"

      - name: Run integrity audit
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/migration-check.db
        run: |
          set -euo pipefail
          python scripts/audit_data_integrity.py

      - name: Verify export and restore
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/export-tests.db
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_export.py \
            tests/test_json_export_validator.py \
            tests/test_json_export_restore_dry_run.py \
            tests/test_recovery_registry.py

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit \
            --requirement requirements.txt \
            --progress-spinner off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm audit --audit-level=high

  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed lines for whitespace errors
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "origin/$BASE_REF...HEAD"
          elif [ -n "${BEFORE_SHA:-}" ] && \
               [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "$BEFORE_SHA...HEAD"
          else
            git diff --check HEAD
          fi

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-tests
      - database-validation
      - frontend
      - dependency-audit
      - repository-hygiene

    steps:
      - name: Require every CI job to pass
        env:
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          DATABASE_RESULT: ${{ needs.database-validation.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-audit.result }}
          HYGIENE_RESULT: ${{ needs.repository-hygiene.result }}
        run: |
          set -euo pipefail

          printf '%s\n' \
            "backend-tests=$BACKEND_RESULT" \
            "database-validation=$DATABASE_RESULT" \
            "frontend=$FRONTEND_RESULT" \
            "dependency-audit=$DEPENDENCY_RESULT" \
            "repository-hygiene=$HYGIENE_RESULT"

          for job_result in \
            "$BACKEND_RESULT" \
            "$DATABASE_RESULT" \
            "$FRONTEND_RESULT" \
            "$DEPENDENCY_RESULT" \
            "$HYGIENE_RESULT"
          do
            test "$job_result" = "success"
          done
