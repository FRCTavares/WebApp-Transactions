name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip check

      - name: Run backend lint
        run: python -m ruff check app tests scripts

      - name: Run backend test suite
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/backend-tests.db
        run: |
          set -euo pipefail
          python -m pytest -q

  database-validation:
    name: Database and recovery
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Upgrade a clean database
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/migration-check.db
        run: |
          set -euo pipefail
          alembic upgrade head
          alembic current
          test "$(alembic heads | grep -c '(head)')" = "1"

      - name: Run integrity audit
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/migration-check.db
        run: |
          set -euo pipefail
          python scripts/audit_data_integrity.py

      - name: Verify export and restore
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/export-tests.db
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_export.py \
            tests/test_json_export_validator.py \
            tests/test_json_export_restore_dry_run.py \
            tests/test_recovery_registry.py

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Check CSS hex ratchet
        run: npm run lint:css

      - name: Run frontend unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  e2e-tests:
    name: Frontend e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Promoted to a required check 2026-07-20 after proving stable across
    # every CI run since it was introduced (#32). See TODO_LIST.md.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.E2E_SUPABASE_JWT_SECRET }}
          ALLOWED_USER_EMAILS: ${{ secrets.E2E_TEST_EMAIL }}
          CORS_ORIGINS: http://127.0.0.1:4173
          APP_ENV: e2e
          DATABASE_URL: sqlite:///${{ runner.temp }}/e2e-tests.db
        run: |
          set -euo pipefail
          PYTHONPATH=. nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 \
            > "${{ runner.temp }}/e2e-backend.log" 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health && exit 0
            sleep 1
          done
          echo "Backend did not become healthy in time" >&2
          cat "${{ runner.temp }}/e2e-backend.log" >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run e2e tests
        working-directory: frontend
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.E2E_SUPABASE_JWT_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit \
            --requirement requirements.txt \
            --progress-spinner off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm audit --audit-level=high

  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed lines for whitespace errors
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "origin/$BASE_REF...HEAD"
          elif [ -n "${BEFORE_SHA:-}" ] && \
               [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "$BEFORE_SHA...HEAD"
          else
            git diff --check HEAD
          fi

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-tests
      - database-validation
      - frontend
      - e2e-tests
      - dependency-audit
      - repository-hygiene

    steps:
      - name: Require every CI job to pass
        env:
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          DATABASE_RESULT: ${{ needs.database-validation.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-audit.result }}
          HYGIENE_RESULT: ${{ needs.repository-hygiene.result }}
        run: |
          set -euo pipefail

          printf '%s\n' \
            "backend-tests=$BACKEND_RESULT" \
            "database-validation=$DATABASE_RESULT" \
            "frontend=$FRONTEND_RESULT" \
            "e2e-tests=$E2E_RESULT" \
            "dependency-audit=$DEPENDENCY_RESULT" \
            "repository-hygiene=$HYGIENE_RESULT"

          for job_result in \
            "$BACKEND_RESULT" \
            "$DATABASE_RESULT" \
            "$FRONTEND_RESULT" \
            "$E2E_RESULT" \
            "$DEPENDENCY_RESULT" \
            "$HYGIENE_RESULT"
          do
            test "$job_result" = "success"
          done
