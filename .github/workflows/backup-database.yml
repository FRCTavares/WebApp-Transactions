name: Backup production database

on:
  schedule:
    # 03:17 UTC daily -- off-peak, avoids the exact-midnight rush other
    # scheduled jobs (and Supabase's own maintenance windows) tend to use.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Dump, validate, encrypt, upload
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          # Ubuntu's default repo only ships an older major pg_dump, and
          # pg_dump refuses to dump from a newer major server version than
          # itself. Add the official PGDG apt repo to install a client
          # version that matches (or exceeds) Supabase's Postgres 17.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget ca-certificates gnupg
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          # The versioned package installs to /usr/lib/postgresql/17/bin
          # without necessarily taking over the unversioned `pg_dump` /
          # `pg_restore` on PATH (Ubuntu's own older client can still win).
          # Prepend it explicitly for every later step in this job.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Verify pg_dump version
        run: pg_dump --version

      - name: Dump production database
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${BACKUP_DATABASE_URL:-}" ]; then
            echo "::error::BACKUP_DATABASE_URL secret is not set. See docs/backups-supabase.md." >&2
            exit 1
          fi

          pg_dump --format=custom --no-owner --no-privileges \
            --dbname="$BACKUP_DATABASE_URL" \
            --file=backup.dump

      - name: Validate the dump
        run: |
          set -euo pipefail
          # Mirrors docs/backups-supabase.md: "Validate each dump with
          # pg_restore --list before considering it successful."
          pg_restore --list backup.dump > /dev/null
          echo "pg_restore --list succeeded: dump is structurally valid."

      - name: Checksum the dump
        run: |
          set -euo pipefail
          sha256sum backup.dump > backup.dump.sha256
          cat backup.dump.sha256

      - name: Encrypt the dump
        env:
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${BACKUP_ENCRYPTION_PASSPHRASE:-}" ]; then
            echo "::error::BACKUP_ENCRYPTION_PASSPHRASE secret is not set. See docs/backups-supabase.md." >&2
            exit 1
          fi

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$BACKUP_ENCRYPTION_PASSPHRASE" \
            --symmetric --cipher-algo AES256 \
            --output backup.dump.gpg backup.dump

          # The plaintext dump must never leave this point as an artifact.
          rm -f backup.dump

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_id }}
          path: |
            backup.dump.gpg
            backup.dump.sha256
          retention-days: 90
          if-no-files-found: error
