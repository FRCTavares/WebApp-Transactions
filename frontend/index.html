<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Pre-JS fallback matching the OS preference. Once ThemeProvider mounts it
         rewrites these to the resolved theme, so an explicit light/dark choice
         that disagrees with the OS is still reflected in the browser chrome.
         Values must stay in sync with --theme-bg in styles/theme.css and
         styles/theme-dark.css. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
    <meta name="apple-mobile-web-app-title" content="Finance" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="Finance" />
    <meta name="description" content="Local-first personal finance tracker" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Finance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
