services:
  - type: web
    name: f-transactions-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: off
    envVars:
      - key: APP_ENV
        value: "production"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: APP_ACCESS_TOKEN
        sync: false
      - key: ALLOWED_USER_EMAILS
        sync: false
      - key: LOCAL_NETWORK_ONLY
        value: "false"
