services:
  - type: web
    name: f-transactions-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/ready
    autoDeployTrigger: off
    envVars:
      - key: APP_ENV
        value: "production"
      - key: API_DOCS_ENABLED
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: ALLOWED_USER_EMAILS
        sync: false
      - key: ADMIN_USER_EMAILS
        sync: false
      - key: LOCAL_NETWORK_ONLY
        value: "false"
      - key: MARKET_DATA_TIMEOUT_SECONDS
        value: "15"
      - key: DATABASE_CONNECT_TIMEOUT_SECONDS
        value: "10"
      - key: DATABASE_STATEMENT_TIMEOUT_MS
        value: "30000"
